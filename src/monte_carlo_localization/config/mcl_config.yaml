# ================================================================================================
# MONTE CARLO LOCALIZATION (MCL) CONFIGURATION
# ================================================================================================
# This configuration file sets parameters for the Monte Carlo Localization node and the map server.

mcl:
  ros__parameters:
    # === CORE ALGORITHM PARAMETERS ===
    max_particles: 3000                # Maximum number of particles
    min_particles: 500                 # Minimum number of particles (for adaptive resampling)
    max_viz_particles: 60              # Visualization downsampling
    max_range: 15.0                    # Laser max range (m)
    max_pose_range: 10000.0           # Maximum valid pose coordinate range (m)

    # === TF CONTROL ===
    # NOTE: Overridden by launch file based on mod argument
    # mod:=sim → false (simulator handles TF)
    # mod:=real → true (MCL publishes map->odom)
    # mod:=bag → true (MCL publishes map->odom)
    publish_map_odom_tf: true          # Publish map->odom transform (default for real robot)

    # === MOTION MODEL SELECTION ===
    motion_model_type: "odometry"        # "simple" or "odometry" (RTR)

    # === SIMPLE MOTION MODEL (fixed Gaussian noise) ===
    motion_dispersion_x: 0.017          # Forward motion noise (m)
    motion_dispersion_y: 0.012          # Lateral motion noise (m)
    motion_dispersion_theta: 0.065      # Rotation noise (rad)

    # === ODOMETRY MOTION MODEL (RTR with motion-proportional noise) ===
    # Based on Probabilistic Robotics Ch 5.4 (Thrun, Burgard, Fox)
    # Tuned for F1TENTH high-speed racing scenarios
    alpha1: 0.3 #0.1 #0.16                        # rotation → rotation noise
    alpha2: 0.025 #0.04 #0.02                       # translation → rotation noise
    alpha3: 0.5 #0.1 #0.7                        # translation → translation noise
    alpha4: 0.2 #1.4 #0.08                        # rotation → translation noise

    # Small motion thresholds (below these, use minimal noise instead of RTR model)
    small_trans_threshold: 0.001       # Translation threshold (m) - 1mm
    small_rot_threshold: 0.001         # Rotation threshold (rad) - ~0.057 degrees

    # === ROBOT GEOMETRY ===
    wheelbase: 0.25                    # Distance between axles (m), matches f1tenth_stack/config/vesc.yaml

    # === VELOCITY ESTIMATION ===
    velocity_filter_alpha: 0.001         # Low-pass filter coefficient (0.0-1.0)
                                       # 0.0 = maximum filtering (very smooth, slow response)
                                       # 0.3 = moderate filtering (balanced, recommended)
                                       # 0.7 = minimal filtering (fast response, more noise)
                                       # 1.0 = no filtering (raw velocity, very noisy)

    # === RESAMPLING ===
    use_adaptive_resampling: true      # Enable adaptive resampling (true/false)
    ess_threshold: 0.3                 # ESS threshold (0.0-1.0): resample if ESS < threshold × max_particles
                                       # 0.3 = aggressive (less resampling, more diversity)
                                       # 0.5 = balanced (recommended for F1Tenth)
                                       # 0.7 = conservative (more resampling, more accuracy)
    resampling_type: "low_variance"    # Resampling method: "multinomial" or "low_variance"
                                       # multinomial: Standard independent sampling (high variance)
                                       # low_variance: Systematic sampling (low variance, recommended)

    # === SENSOR MODEL ===
    sensor_model_type: "beam"                      # "beam" or "likelihood_field"
    omp_schedule_type: "static"
    omp_chunk_size: 0

    # === BEAM MODEL PARAMETERS (4-component mixture model) ===
    # Used when sensor_model_type: "beam"
    # Components: z_hit + z_short + z_max + z_rand = 1.0
    beam_z_hit: 0.81                   # Weight for correct measurements (Gaussian)
    beam_z_short: 0.10                 # Weight for short readings (dynamic obstacles, motion blur)
    beam_z_max: 0.02                   # Weight for max range readings
    beam_z_rand: 0.07                  # Weight for random noise (reflections, interference)
    beam_sigma_hit: 0.2                # Measurement noise std dev (meters)

    # === LIKELIHOOD FIELD MODEL PARAMETERS (2-component mixture model) ===
    # Used when sensor_model_type: "likelihood_field"
    # Components: z_hit + z_rand = 1.0 (z_short and z_max are NOT used)
    likelihood_z_hit: 0.85             # Weight for correct measurements (Gaussian)
    likelihood_z_rand: 0.15            # Weight for random noise (reflections, interference)
    likelihood_sigma: 0.1              # Distance field Gaussian sigma (meters)

    # === RAY CASTING ===
    angle_step: 18                     # Laser downsampling factor
    squash_factor: 1.2                 # Weight normalization power
    use_parallel_raycasting: true      # Enable parallel processing
    num_threads: 0                     # Auto-detect threads

    # === ROS INTERFACE ===
    scan_topic: "/scan"                # LaserScan input topic
    odom_topic: "/odom"                # Odometry input topic
    publish_odom: true                 # Publish pose as odometry message
    viz: true                          # Enable particle visualization
    timer_frequency: 50.0              # Timer frequency (Hz) - TF publishing rate (higher than LiDAR for smooth tracking)

    # === TF FRAME NAMES ===
    map_frame: "map"                   # Global reference frame
    odom_frame: "odom"                 # Odometry frame
    base_frame: "base_link"            # Robot base frame
    laser_frame: "laser"               # Laser scanner frame
    

# ================================================================================================
# MAP SERVER CONFIGURATION
# ================================================================================================
map_server:
  ros__parameters:
    # Default map file (override with launch argument: map_name:='your_map')
    map: '31_1st_carto'                      # Map name without .yaml extension
